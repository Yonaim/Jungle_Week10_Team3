{
    "Version": 1,
    "Options": {
        "Recursive": true,
        "NormalizeExtensionToLower": true,
        "UseRelativePathFromRoot": true
    },
    "ImportPresets": {
        "StaticMesh": {
            "AllowedExtensions": [
                ".fbx",
                ".obj",
                ".gltf",
                ".glb"
            ],
            "DestinationRoot": "Asset/Game/Content/Meshes",
            "GenerateMaterials": true,
            "GenerateTextures": true
        },
        "SkeletalMesh": {
            "AllowedExtensions": [
                ".fbx"
            ],
            "DestinationRoot": "Asset/Game/Content/Meshes",
            "RequireSkeletonOrSkin": true,
            "GenerateMaterials": true,
            "GenerateTextures": true
        },
        "Texture": {
            "AllowedExtensions": [
                ".png",
                ".jpg",
                ".jpeg",
                ".bmp",
                ".tga",
                ".dds"
            ],
            "DestinationRoot": "Asset/Game/Content/Textures"
        },
        "Material": {
            "AllowedExtensions": [
                ".mtl",
                ".mat"
            ],
            "DestinationRoot": "Asset/Game/Content/Materials"
        }
    },
    "ScanRules": {
        "Sound": {
            "GameContent": {
                "Directory": "Asset/Game/Content/Sound",
                "Extensions": [
                    ".mp3",
                    ".wav",
                    ".ogg",
                    ".flac"
                ],
                "Category": "SFX"
            }
        },
        "Material": {
            "EngineSamples": {
                "Directory": "Asset/Engine/Source/SampleMTL",
                "Extensions": [
                    ".mat"
                ],
                "Aliases": {
                    "brick": "Sample.Material.Brick",
                    "checker": "Sample.Material.Checker",
                    "fakelight": "Sample.Material.FakeLight",
                    "metal": "Sample.Material.Metal",
                    "wood": "Sample.Material.Wood"
                }
            }
        },
        "Texture": {
            "EngineSamples": {
                "Directory": "Asset/Engine/Source/SampleMTL",
                "Extensions": [
                    ".png",
                    ".jpg",
                    ".jpeg",
                    ".bmp",
                    ".tga",
                    ".dds"
                ]
            }
        }
    }
}
