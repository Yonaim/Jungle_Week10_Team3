{
    "Version": 1,
    "Roots": {
        "AssetRoot": "Asset",
        "ContentRoot": "Asset/Game/Content",
        "ShaderCacheRoot": "Shaders/Cache",
        "EngineContentRoot": "Asset/Engine/Content",
        "EngineSourceRoot": "Asset/Engine/Source"
    },
    "ContentPolicy": {
        "ContentAllowsOnlyCookedAssets": true,
        "AllowedContentExtensions": [
            ".uasset",
            ".umap"
        ],
        "EngineContentAllowsOnlyCookedAssets": true,
        "ShowEngineContentInContentBrowser": true
    },
    "ImportPolicy": {
        "AllowExternalSourceFiles": true,
        "DefaultImportedAssetFolder": "Asset/Game/Content",
        "OpenAssetEditorAfterImport": false
    }
}
