{
    "Version": 1,
    "Roots": {
        "AssetRoot": "Asset",
        "ContentRoot": "Asset/Content",
        "SourceAssetsRoot": "Asset/SourceAssets",
        "DerivedDataCacheRoot": "Asset/DerivedDataCache",
        "ShaderCacheRoot": "Asset/DerivedDataCache/Shaders",
        "EngineContentRoot": "Asset/EngineContent"
    },
    "ContentPolicy": {
        "ContentAllowsOnlyCookedAssets": true,
        "AllowedContentExtensions": [
            ".uasset",
            ".umap"
        ],
        "ShowSourceAssetsInContentBrowser": false,
        "ShowDerivedDataCacheInContentBrowser": false,
        "EngineContentAllowsOnlyCookedAssets": true,
        "ShowEngineContentInContentBrowser": true
    },
    "ImportPolicy": {
        "SourceFileSearchRoots": [
            "Asset/SourceAssets/Meshes",
            "Asset/SourceAssets/Models",
            "Asset/SourceAssets/Texture",
            "Asset/SourceAssets/Materials",
            "Asset/SourceAssets/Sound",
            "Asset/SourceAssets/Data"
        ],
        "AllowExternalSourceFiles": true,
        "DefaultImportedAssetFolder": "Asset/Content",
        "CopyImportedTexturesToSourceAssets": true,
        "OpenAssetEditorAfterImport": true
    }
}
